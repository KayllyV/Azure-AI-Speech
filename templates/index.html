<!DOCTYPE html>
<html>
<head>
  <title>Voice Memo Analyzer</title>

  <style>
    body {
      background: linear-gradient(135deg, #ffe6f0, #fff0f5);
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #ff4d88;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    h2 {
      color: #ff66a3;
      margin-top: 30px;
    }

    button {
      background-color: #ff85a2;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      transition: 0.2s ease;
    }

    button:hover {
      background-color: #ff4d88;
      transform: scale(1.05);
    }

    button:disabled {
      background-color: #ffc2d1;
      cursor: not-allowed;
    }

    input {
      margin-top: 10px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ffb3c6;
    }

    pre {
      background: #fff0f5;
      padding: 15px;
      border-radius: 12px;
      text-align: left;
      max-width: 700px;
      margin: 20px auto;
      overflow-x: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    #recordingStatus {
      color: #ff4d88;
      font-weight: bold;
      margin-top: 10px;
    }

    audio {
      margin-top: 10px;
      border-radius: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      margin: 20px auto;
      max-width: 750px;
      box-shadow: 0 6px 15px rgba(255, 105, 135, 0.2);
    }
  </style>
</head>

<body>
  <h1>🎀 Voice Memo Analyzer</h1>

  <div class="card">
    <h2>Record a memo</h2>
    <button id="recordBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <p id="recordingStatus">Not recording.</p>
  </div>

  <div class="card">
    <h2>Or upload an audio file</h2>
    <input type="file" id="audioFile" accept=".wav,.mp3,.ogg,.webm">
    <br>
    <button id="submitBtn">Submit</button>
  </div>

  <div class="card">
    <h2>Results</h2>
    <pre id="results">No results yet.</pre>
  </div>

  <div class="card">
    <h2>Audio Summary</h2>
    <audio id="audioPlayer" controls></audio>
  </div>

  <script>
    let mediaRecorder;
    let recordedChunks = [];
    let recordedBlob = null;

    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const submitBtn = document.getElementById("submitBtn");
    const fileInput = document.getElementById("audioFile");
    const resultsBox = document.getElementById("results");
    const audioPlayer = document.getElementById("audioPlayer");
    const recordingStatus = document.getElementById("recordingStatus");

    recordBtn.addEventListener("click", async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      recordedChunks = [];
      recordedBlob = null;

      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(recordedChunks, { type: "audio/webm" });
        recordingStatus.textContent = "Recording saved. Click Submit.";
      };

      mediaRecorder.start();
      recordingStatus.textContent = "Recording...";
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    });

    stopBtn.addEventListener("click", () => {
      mediaRecorder.stop();
      recordBtn.disabled = false;
      stopBtn.disabled = true;
    });

    submitBtn.addEventListener("click", async () => {
      const formData = new FormData();

      if (recordedBlob) {
        formData.append("audio", recordedBlob, "browser-recording.webm");
      } else if (fileInput.files.length) {
        formData.append("audio", fileInput.files[0]);
      } else {
        resultsBox.textContent = "Please record audio or select a file first.";
        return;
      }

      resultsBox.textContent = "Processing...";

      try {
        const response = await fetch("/process", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        resultsBox.textContent = JSON.stringify(data, null, 2);

        if (data.tts && data.tts.audio_base64) {
          audioPlayer.src = "data:audio/mp3;base64," + data.tts.audio_base64.trim();
          audioPlayer.load();
        }
      } catch (error) {
        resultsBox.textContent = "Error: " + error;
      }
    });
  </script>
</body>
</html>
