<!DOCTYPE html>
<html>
<head>
  <title>Voice Memo Analyzer</title>
</head>
<body>
  <h1>Voice Memo Analyzer</h1>

  <h2>Record a memo</h2>
  <button id="recordBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>
  <p id="recordingStatus">Not recording.</p>

  <h2>Or upload an audio file</h2>
  <input type="file" id="audioFile" accept=".wav,.mp3,.ogg,.webm">

  <button id="submitBtn">Submit</button>

  <h2>Results</h2>
  <pre id="results">No results yet.</pre>

  <h2>Audio Summary</h2>
  <audio id="audioPlayer" controls></audio>

  <script>
    let mediaRecorder;
    let recordedChunks = [];
    let recordedBlob = null;

    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const submitBtn = document.getElementById("submitBtn");
    const fileInput = document.getElementById("audioFile");
    const resultsBox = document.getElementById("results");
    const audioPlayer = document.getElementById("audioPlayer");
    const recordingStatus = document.getElementById("recordingStatus");

    recordBtn.addEventListener("click", async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      recordedChunks = [];
      recordedBlob = null;

      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(recordedChunks, { type: "audio/webm" });
        recordingStatus.textContent = "Recording saved. Click Submit.";
      };

      mediaRecorder.start();
      recordingStatus.textContent = "Recording...";
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    });

    stopBtn.addEventListener("click", () => {
      mediaRecorder.stop();
      recordBtn.disabled = false;
      stopBtn.disabled = true;
    });

    submitBtn.addEventListener("click", async () => {
      const formData = new FormData();

      if (recordedBlob) {
        formData.append("audio", recordedBlob, "browser-recording.webm");
      } else if (fileInput.files.length) {
        formData.append("audio", fileInput.files[0]);
      } else {
        resultsBox.textContent = "Please record audio or select a file first.";
        return;
      }

      resultsBox.textContent = "Processing...";

      try {
        const response = await fetch("/process", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        resultsBox.textContent = JSON.stringify(data, null, 2);

        if (data.tts && data.tts.audio_base64) {
          audioPlayer.src = "data:audio/mp3;base64," + data.tts.audio_base64.trim();
          audioPlayer.load();
        }
      } catch (error) {
        resultsBox.textContent = "Error: " + error;
      }
    });
  </script>
</body>
</html>
