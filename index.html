<!DOCTYPE html>
<html>
<head>
  <title>Voice Memo Analyzer</title>
</head>
<body>
  <h1>Voice Memo Analyzer</h1>

  <h2>Upload an audio file</h2>
  <input type="file" id="audioFile" accept=".wav,.mp3,.ogg">

  <button id="submitBtn">Submit</button>

  <h2>Results</h2>
  <pre id="results">No results yet.</pre>

  <h2>Audio Summary</h2>
  <audio id="audioPlayer" controls></audio>

  <script>
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const fileInput = document.getElementById("audioFile");
      const resultsBox = document.getElementById("results");
      const audioPlayer = document.getElementById("audioPlayer");

      if (!fileInput.files.length) {
        resultsBox.textContent = "Please select a file first.";
        return;
      }

      const formData = new FormData();
      formData.append("audio", fileInput.files[0]);

      resultsBox.textContent = "Processing...";

      try {
        const response = await fetch("/process", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        resultsBox.textContent = JSON.stringify(data, null, 2);

        if (data.tts && data.tts.audio_base64) {
          audioPlayer.pause();
          audioPlayer.src = "";
          audioPlayer.src = "data:audio/mp3;base64," + data.tts.audio_base64.trim();
          console.log("Audio src prefix:", audioPlayer.src.substring(0, 40));
          console.log("Base64 length:", data.tts.audio_base64.length);
          audioPlayer.load();
          audioPlayer.play().catch(() => {
            console.log("Autoplay blocked — press play manually");
          });
        } else {
          console.log("No TTS audio found in response");
        }

      } catch (error) {
        resultsBox.textContent = "Error: " + error;
      }
    });
  </script>
</body>
</html>
